name: CI

# Build + lint + typecheck + unit tests + hook/script harnesses on every push/PR
# (the exact layers are the package.json `test` chain — runner output is SSOT).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
